name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Test + coverage
        run: npm run test:coverage
      - name: Build
        run: npm run build
      - name: Publish smoke (import the built entrypoint)
        run: node -e "import('./dist/index.js').then(m => { if (!m.MCPClient) throw new Error('missing MCPClient export'); console.log('ok'); })"
      - name: Inspector typecheck + build
        run: |
          npm run typecheck -w @mcp-query/inspector
          npm run build -w @mcp-query/inspector
